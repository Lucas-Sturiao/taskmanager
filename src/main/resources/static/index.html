<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

    <div class="app">

        <!-- HEADER -->
        <header class="header">
            <div class="header-inner">
                <div class="logo">
                    <span class="logo-icon">✦</span>
                    <span class="logo-text">TaskFlow</span>
                </div>
                <div class="stats" id="stats">
                    <span class="stat"><span id="totalCount">0</span> tarefas</span>
                    <span class="stat-divider">·</span>
                    <span class="stat done"><span id="doneCount">0</span> concluídas</span>
                </div>
            </div>
        </header>

        <!-- MAIN -->
        <main class="main">

            <!-- FORM CARD -->
            <section class="form-section">
                <h2 class="section-label">Nova Tarefa</h2>
                <div class="card form-card">
                    <div class="form-row">
                        <input
                            type="text"
                            id="taskTitle"
                            class="input"
                            placeholder="O que precisa ser feito?"
                            maxlength="100"
                            autocomplete="off"
                        />
                    </div>
                    <div class="form-row">
                        <textarea
                            id="taskDescription"
                            class="input textarea"
                            placeholder="Descrição (opcional)"
                            maxlength="500"
                            rows="2"
                        ></textarea>
                    </div>
                    <div class="form-footer">
                        <div class="priority-group">
                            <label class="priority-label">Prioridade</label>
                            <div class="priority-options">
                                <label class="prio-opt">
                                    <input type="radio" name="priority" value="BAIXA" />
                                    <span class="prio-pill baixa">Baixa</span>
                                </label>
                                <label class="prio-opt">
                                    <input type="radio" name="priority" value="MEDIA" checked />
                                    <span class="prio-pill media">Média</span>
                                </label>
                                <label class="prio-opt">
                                    <input type="radio" name="priority" value="ALTA" />
                                    <span class="prio-pill alta">Alta</span>
                                </label>
                            </div>
                        </div>
                        <button class="btn btn-primary" id="addBtn" onclick="addTask()">
                            <span>+ Adicionar</span>
                        </button>
                    </div>
                </div>
            </section>

            <!-- FILTERS + SEARCH -->
            <section class="controls-section">
                <div class="search-wrap">
                    <span class="search-icon">⌕</span>
                    <input type="text" id="searchInput" class="input search-input" placeholder="Buscar tarefas..." oninput="handleSearch()" />
                </div>
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">Todas</button>
                    <button class="filter-btn" data-filter="pending" onclick="setFilter('pending', this)">Pendentes</button>
                    <button class="filter-btn" data-filter="done" onclick="setFilter('done', this)">Concluídas</button>
                </div>
            </section>

            <!-- TASK LIST -->
            <section class="tasks-section">
                <div id="taskList" class="task-list">
                    <!-- Tarefas renderizadas pelo JS -->
                </div>
                <div id="emptyState" class="empty-state hidden">
                    <div class="empty-icon">◌</div>
                    <p>Nenhuma tarefa encontrada</p>
                </div>
                <div id="loading" class="loading">
                    <div class="spinner"></div>
                </div>
            </section>

        </main>

    </div>

    <!-- MODAL DE EDIÇÃO -->
    <div id="editModal" class="modal-overlay hidden" onclick="closeModalOnOverlay(event)">
        <div class="modal-card">
            <div class="modal-header">
                <h3 class="modal-title">Editar Tarefa</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId" />
                <div class="form-row">
                    <label class="field-label">Título</label>
                    <input type="text" id="editTitle" class="input" maxlength="100" />
                </div>
                <div class="form-row">
                    <label class="field-label">Descrição</label>
                    <textarea id="editDescription" class="input textarea" maxlength="500" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <label class="field-label">Prioridade</label>
                    <div class="priority-options">
                        <label class="prio-opt">
                            <input type="radio" name="editPriority" value="BAIXA" />
                            <span class="prio-pill baixa">Baixa</span>
                        </label>
                        <label class="prio-opt">
                            <input type="radio" name="editPriority" value="MEDIA" />
                            <span class="prio-pill media">Média</span>
                        </label>
                        <label class="prio-opt">
                            <input type="radio" name="editPriority" value="ALTA" />
                            <span class="prio-pill alta">Alta</span>
                        </label>
                    </div>
                </div>
                <label class="checkbox-row">
                    <input type="checkbox" id="editCompleted" />
                    <span>Marcar como concluída</span>
                </label>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="saveEdit()">Salvar</button>
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="toast hidden"></div>

    <script src="/js/app.js"></script>
</body>
</html>
